    Sectors/categories/themes (иў«еӢ•е…ғд»¶, еҚҠе°Һй«”, йӮҠз·ЈйҒӢз®—) are #tag:, NEVER #ticker:.
    Common mappings: еҸ°з©Қйӣ»вҶ’2330, иҒҜзҷјз§‘вҶ’2454, йҙ»жө·вҶ’2317, ијқйҒ”вҶ’NVDA, иҳӢжһңвҶ’AAPL,
    и°·жӯҢвҶ’GOOGL, зҫҺе…үвҶ’MU, SKжө·еҠӣеЈ«вҶ’000660, дёүжҳҹвҶ’005930, еҚҡйҖҡвҶ’AVGO, и¶…еҫ®вҶ’AMD, йҳҝж–ҜйәҘ/ASMLвҶ’ASML,
    SpaceXвҶ’SPCX.
  - Tags: Format as [йЎҜзӨәеҗҚ](#tag:Slug) вҖ” e.g., [еҚҠе°Һй«”](#tag:Semiconductor). The slug
