  - Use semantic keywords throughout
  - Keep paragraphs concise (3-5 sentences)
  - Use proper heading hierarchy (don't skip levels)

user: |
  Generate a Traditional Chinese financial news article from the following clustered events:

  Events:
  {events}

  Source: {source}
  Episode Title: {episode_title}

  Requirements:
  - Language: Traditional Chinese (з№Ғй«”дёӯж–Ү)
  - Target length: 1500-2500 words
  - Tone: Professional, investor-facing
  - CRITICAL: Include stock ticker links for EVERY company mentioned using format [Display Name](#ticker:SYMBOL) вҖ” embed them inline throughout paragraph prose, not just in the stock_tickers array. If a company is discussed (even briefly), it MUST have a #ticker: link. This is mandatory for downstream ticker extraction.
  - Include topic tags where relevant using format [йЎҜзӨәеҗҚ](#tag:Slug) вҖ” embed inline in prose. Tags are for broad themes/indices only; individual companies must use #ticker: format.
    Pick slugs ONLY from this canonical vocabulary (Slug = йЎҜзӨәеҗҚ), EXACTLY as written.
    Never invent, pluralize, or translate a slug; if none fits a theme, omit the tag:
    {tag_vocabulary}
  - tags array: each item is {{"display_name": "<zh-TW>", "tag_name": "<the same ASCII slug>"}}
  - Focus ONLY on financial/market content; silently drop any non-financial topics
  - For each section heading: rewrite the section_topic as an editorial headline that captures the key insight (e.g. "еёӮе ҙеӢ•зӣӘдёӢзҡ„з”ҹеӯҳжі•еүҮпјҡеҫһж©ҹж§Ӣж“ҚдҪңи§ЈжһҗеҲ°йҖҶеҗ‘жҠ•иіҮзӯ–з•Ҙ"), NOT a literal transcript label; output plain text only вҖ” NEVER embed any timestamp, (#time:...), or MM:SS text in the heading
  - Each section should contain 3-4 substantial analytical paragraphs, not bullet lists
  - Write ONE section per input event, in the SAME order the events are given вҖ” do not reorder or invent sections. The chapter timestamp shown to users is computed by code from each event's real position; do NOT try to author it yourself
  - start_time: copy event.start verbatim when present (it is only an ordering hint вҖ” code re-derives the authoritative value). Omit it rather than guessing; NEVER use a sequence number like 1/2/3

  Output a structured JSON object with the following fields:
  - title: Article title in Traditional Chinese
  - executive_summary: 2-3 sentence summary in Traditional Chinese
  - sections: Array of section objects, each with:
    - heading: Editorial headline in plain text (no leading ## or timestamp) вҖ” e.g. "еёӮе ҙеӢ•зӣӘдёӢзҡ„з”ҹеӯҳжі•еүҮпјҡеҫһж©ҹж§Ӣж“ҚдҪңи§ЈжһҗеҲ°йҖҶеҗ‘жҠ•иіҮзӯ–з•Ҙ"
    - content: Section content in Markdown format вҖ” full paragraphs with inline ticker and tag links throughout
    - start_time: Ordering hint only вҖ” copy event.start (milliseconds) when available, else omit. Code re-derives the authoritative chapter time; never put a sequence number here
    - subsections: Optional array of subsection objects with heading and content
  - conclusion: Conclusion paragraph in Traditional Chinese
  - stock_tickers: Array of stock ticker objects with display_name and symbol
  - tags: Array of tag objects with display_name and tag_name
