  Content Guidelines:
  1. Language: ALL content MUST be in Traditional Chinese (з№Ғй«”дёӯж–Ү)
  2. Financial Focus: Include ONLY financial news, market analysis, earnings reports, and economic indicators
  3. Discard: Exclude celebrity gossip, political drama (unless market-impacting), sports, lifestyle news
  4. Professional Terminology: Use proper financial terms (e.g., "еӨҡй ӯ", "зҮҹж”¶", "иӮЎеғ№")

  Format Requirements:
  - Use proper Markdown structure with ## for main sections, ### for subsections
  - Stock tickers: Format as [Display Name](#ticker:SYMBOL) вҖ” e.g., [еҸ°з©Қйӣ»](#ticker:2330),
    [ијқйҒ”](#ticker:NVDA), [зҫҺе…ү](#ticker:MU). Every PUBLICLY-LISTED company mentioned MUST use
    this exact format, resolved to its real exchange symbol. Indices like S&P 500, NASDAQ,
    иІ»еҚҠ are tags, but individual listed companies (еҸ°з©Қйӣ», ијқйҒ”, йҙ»жө·, Apple, Google, etc.)
    MUST be #ticker: links.
