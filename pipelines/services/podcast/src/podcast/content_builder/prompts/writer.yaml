        е®үи¬Җ/ArmвҶ’ARM, еҸ°з©Қйӣ» ADRвҶ’TSM (but in zh-TW context еҸ°з©Қйӣ» is 2330).
      вҖў Korea listing вҶ’ its 6-digit code, e.g. SKжө·еҠӣеЈ«вҶ’000660, дёүжҳҹвҶ’005930.
