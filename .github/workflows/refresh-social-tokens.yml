name: Refresh Social Tokens

# Threads long-lived access tokens expire after 60 days but can be refreshed
# (each refresh extends another 60 days). Run WEEKLY so the token never lapses: even
# if several runs fail or are skipped, there are ~8 chances inside the 60-day window
# (monthly left no margin — a single missed/late run can let the token expire).
# Also runnable on demand from the Actions tab. NOTE: refresh only works while the
# token is still valid; an already-expired token must be re-minted by hand.
#
# This only updates the GSM secret THREADS_ACCESS_TOKEN. The backend reads secrets
# at startup, so the refreshed token takes effect on the next backend deploy — which
# happens on every merge to develop/main, well within the 60-day window. If a
# service ever runs >60 days with no deploy, re-run the latest "Backend Build &
# Deploy" workflow to pick it up.
#
# Facebook Page tokens derived from a long-lived user token do not expire, so there
# is nothing to refresh for Facebook.

on:
  schedule:
    - cron: '0 3 * * 1'        # 03:00 UTC every Monday
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: gen-lang-client-0901363254

jobs:
  refresh-threads-token:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install --quiet google-cloud-secret-manager

      - name: Refresh Threads token in GSM
        run: python backend/scripts/ops/refresh_threads_token.py
